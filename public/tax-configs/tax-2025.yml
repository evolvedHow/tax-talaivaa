levers:
  - id: filing_status
    label: Filing Status
    type: dropdown
    default: single
    options:
      - single
      - married_filing_jointly
      - head_of_household
      - married_filing_separately
    help: >
      Determines your tax brackets, standard deduction, and credit phase-out
      thresholds. Married Filing Jointly generally yields the most favorable
      rates. Head of Household requires being unmarried with a qualifying
      dependent living with you more than half the year.

  - id: wages_income
    label: W-2 Wages
    type: slider
    min: 0
    max: 1000000
    step: 5000
    default: 150000
    help: >
      W-2 wages from employment. Taxed at graduated federal brackets (10%–37%).
      Starting point for IRA deduction phase-out calculations.

  - id: bonus
    label: Bonus / Other Ordinary Income
    type: slider
    min: 0
    max: 500000
    step: 5000
    default: 0
    help: >
      Cash bonuses, commissions, or other W-2 ordinary income beyond regular
      wages. Taxed at your marginal bracket rate.

  - id: investment_income
    label: Interest / Non-Qualified Dividends
    type: slider
    min: 0
    max: 200000
    step: 1000
    default: 0
    help: >
      Bank interest, bond interest, and non-qualified dividends. Taxed at
      regular income bracket rates — not the preferential 0/15/20% rate.
      Counts toward the NIIT base.

  - id: short_term_capital_gains
    label: Short-Term Capital Gains
    type: slider
    min: 0
    max: 500000
    step: 5000
    default: 0
    help: >
      Gains from assets held 1 year or less. Taxed as ordinary income at your
      marginal bracket rate. Consider holding over 1 year to convert to
      long-term rates.

  - id: business_income
    label: Business / Self-Employment Income
    type: slider
    min: 0
    max: 1000000
    step: 5000
    default: 0
    help: >
      Net Schedule C profit or other self-employment income after business
      expenses. Taxed at regular income brackets. Note: the ~15.3%
      self-employment tax is not separately modeled here.

  - id: capital_gains
    label: Long-Term Capital Gains
    type: slider
    min: 0
    max: 500000
    step: 5000
    default: 0
    help: >
      Gains from assets held more than 1 year. Taxed at preferential federal
      rates: 0%, 15%, or 20% depending on total income.

  - id: qualified_dividends
    label: Qualified Dividends
    type: slider
    min: 0
    max: 500000
    step: 1000
    default: 0
    help: >
      Dividends from domestic and qualifying foreign corporations held for the
      required period. Taxed at the same preferential 0/15/20% rates as
      long-term capital gains. Counts toward the NIIT base.

  - id: rental_income
    label: Rental / Passive Income
    type: slider
    min: 0
    max: 500000
    step: 5000
    default: 0
    help: >
      Net rental income after expenses. Treated as ordinary income here
      (passive activity loss rules are not modeled). Counts toward the NIIT
      base for the 3.8% surtax.

  - id: ira_contribution
    label: IRA Contribution
    type: slider
    min: 0
    max: 8000
    step: 500
    default: 0
    help: >
      Traditional IRA contributions reduce taxable income dollar-for-dollar
      (subject to phase-out if covered by a workplace plan). 2025 limit:
      $7,000 ($8,000 if age 50+).

  - id: has_workplace_plan
    label: Covered by Workplace Retirement Plan
    type: toggle
    default: false
    help: >
      If you (or your spouse for MFJ) participate in a 401(k), 403(b), SEP,
      or SIMPLE plan, your Traditional IRA deduction phases out at lower MAGI
      levels. Without any workplace plan coverage, the full IRA contribution
      is always deductible regardless of income.

  - id: age
    label: Age
    type: integer
    min: 18
    max: 90
    step: 1
    default: 40
    help: >
      Used to calculate IRA catch-up contribution eligibility ($1,000 extra
      allowed at age 50+). Also used together with the "Over 65" toggle to
      apply the senior standard deduction bonus.

  - id: over_65
    label: Age 65 or Older (senior bonus)
    type: toggle
    default: false
    help: >
      Taxpayers 65 or older receive an extra standard deduction. For 2025:
      $2,000 additional for single/HoH, $1,600 for each qualifying spouse in MFJ.

  - id: num_children
    label: Qualifying Children (Child Tax Credit)
    type: integer
    min: 0
    max: 10
    step: 1
    default: 0
    help: >
      Each qualifying child under age 17 earns a $2,000 Child Tax Credit.
      Phases out by $50 per $1,000 of income above $200K (single) or $400K (MFJ).

  - id: state_local_tax
    label: State & Local Taxes Paid (SALT)
    type: slider
    min: 0
    max: 50000
    step: 500
    default: 8000
    help: >
      State income taxes or property taxes you paid during the year. Deductible
      only when itemizing, and capped at $10,000 ($5,000 if MFS) under the
      TCJA SALT cap. High-tax-state residents often hit this cap quickly.

  - id: mortgage_interest
    label: Mortgage Interest Paid
    type: slider
    min: 0
    max: 100000
    step: 500
    default: 0
    help: >
      Interest on mortgage acquisition debt up to $750,000 (loans originated
      after Dec 15, 2017). Deductible only when itemizing.

  - id: charitable_contributions
    label: Charitable Contributions
    type: slider
    min: 0
    max: 500000
    step: 1000
    default: 0
    help: >
      Cash donations to qualified 501(c)(3) organizations. Deductible only
      when itemizing, capped at 60% of AGI for cash donations.

  - id: state
    label: State
    type: dropdown
    default: none
    options:
      - none
      - NY
      - GA
    help: >
      Adds state income tax to your total liability. New York uses progressive
      brackets (4%–8.82%); Georgia uses a flat 5.39% rate for 2025. Select
      "none" for states with no income tax (FL, TX, WA, etc.).

  - id: iso_options_exercised
    label: Exercised ISO Stock Options (AMT trigger)
    type: toggle
    default: false
    help: >
      Exercising Incentive Stock Options creates an AMT preference item.
      This can trigger significant Alternative Minimum Tax. Consult a tax
      advisor before exercising a large ISO grant.

  - id: has_amt_preference_items
    label: Has AMT Preference Items
    type: toggle
    default: false
    help: >
      Certain deductions and income items are added back under AMT rules.
      The AMT exemption for 2025 is $88,100 (single) / $137,000 (MFJ).

  - id: federal_withheld
    label: Federal Tax Already Withheld (W-2 Box 2)
    type: slider
    min: 0
    max: 200000
    step: 500
    default: 0
    help: >
      Total federal income tax withheld from paychecks plus estimated
      tax payments (Form 1040-ES). The app will show your refund or
      amount owed based on this vs. your computed liability.

  - id: state_withheld
    label: State Tax Already Withheld (W-2 Box 17)
    type: slider
    min: 0
    max: 100000
    step: 250
    default: 0
    help: >
      State income tax withheld from paychecks. Add all W-2s and any
      estimated state tax payments made during the year.

